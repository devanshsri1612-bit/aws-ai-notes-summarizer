<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteGenius AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: #121212;
      color: white;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 700px;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark .container {
      background: #1e1e1e;
      color: white;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    body.dark p {
      color: #ccc;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: none;
      box-sizing: border-box;
      margin-top: 15px;
    }

    body.dark textarea {
      background: #2a2a2a;
      color: white;
      border: 1px solid #555;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      padding: 12px 18px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005ea6;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      min-height: 80px;
      background-color: #fafafa;
      white-space: pre-wrap;
    }

    body.dark #result {
      background: #2a2a2a;
      border: 1px solid #555;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .word-count {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }

    body.dark .word-count {
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <h1>NoteGenius AI</h1>
      <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>

    <p>Paste your notes below and get a smart AI summary.</p>

    <textarea id="notes" placeholder="Paste your notes here" oninput="updateWordCount()"></textarea>

    <div class="word-count" id="wordCount">Words: 0</div>

    <div class="buttons">
      <button onclick="summarizeNotes()">Summarize</button>
      <button onclick="copySummary()">Copy Summary</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <div id="result">Your summary will appear here...</div>
  </div>

  <script>
    async function summarizeNotes() {
      const notes = document.getElementById("notes").value;
      const resultDiv = document.getElementById("result");

      if (!notes.trim()) {
        resultDiv.innerText = "Please enter some notes first.";
        return;
      }

      resultDiv.innerText = "Generating summary...";

      try {
        const response = await fetch("https://1n98cfm4ri.execute-api.eu-north-1.amazonaws.com/dev/summarize", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            notes: notes
          })
        });

        const data = await response.json();
        console.log(data);

        if (data.summary) {
          resultDiv.innerText = data.summary;
        } else if (data.body) {
          try {
            const parsedBody = JSON.parse(data.body);
            resultDiv.innerText = parsedBody.summary || data.body;
          } catch {
            resultDiv.innerText = data.body;
          }
        } else {
          resultDiv.innerText = "No summary returned.";
        }

      } catch (error) {
        console.error(error);
        resultDiv.innerText = "Error: " + error.message;
      }
    }

    function copySummary() {
      const summary = document.getElementById("result").innerText;
      navigator.clipboard.writeText(summary);
      alert("Summary copied!");
    }

    function clearAll() {
      document.getElementById("notes").value = "";
      document.getElementById("result").innerText = "Your summary will appear here...";
      document.getElementById("wordCount").innerText = "Words: 0";
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function updateWordCount() {
      const text = document.getElementById("notes").value.trim();
      const count = text === "" ? 0 : text.split(/\s+/).length;
      document.getElementById("wordCount").innerText = "Words: " + count;
    }
  </script>

</body>
</html>
